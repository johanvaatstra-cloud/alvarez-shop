version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: alvarez_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: alvarez
      POSTGRES_PASSWORD: alvarez_dev_2025
      POSTGRES_DB: alvarez_catalunya
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
